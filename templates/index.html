<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Q&A System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0b0e14;
      --surface:     #131720;
      --surface2:    #1a2030;
      --surface3:    #202840;
      --border:      rgba(255,255,255,0.07);
      --border-glow: rgba(99,179,255,0.25);

      --accent:      #3d9fff;
      --accent2:     #7c5cfc;
      --accent3:     #ff6b6b;
      --accent-warn: #ffb347;
      --green:       #3dff9f;

      --text:        #e8edf5;
      --text-2:      #8a99b8;
      --text-3:      #4f5d7a;

      --radius:      14px;
      --radius-sm:   8px;
      --shadow:      0 8px 32px rgba(0,0,0,0.5);
      --glow:        0 0 24px rgba(61,159,255,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: "DM Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background grid ───────────────────────────────────── */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(61,159,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61,159,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glow orbs ──────────────────────────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.25;
      animation: floatOrb 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--accent2); top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: var(--accent);  bottom: -50px; right: -50px; animation-delay: -6s; }

    @keyframes floatOrb {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 40px) scale(1.1); }
    }

    /* ── Layout ─────────────────────────────────────────────────────── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 16px rgba(61,159,255,0.3);
    }
    .logo h1 {
      font-family: "Syne", sans-serif;
      font-size: 1.3rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo p { font-size: 0.75rem; color: var(--text-2); margin-top: 2px; }

    #file-badge {
      display: none;
      align-items: center; gap: 8px;
      background: rgba(61,159,255,0.1);
      border: 1px solid var(--border-glow);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem; color: var(--accent);
    }
    #file-badge.active { display: flex; }
    #file-badge span { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Tabs ───────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      margin: 24px 0 0;
      background: var(--surface);
      border-radius: 12px;
      padding: 4px;
      width: fit-content;
      border: 1px solid var(--border);
    }
    .tab-btn {
      padding: 9px 20px;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: var(--text-2);
      font-family: "DM Sans", sans-serif;
      font-size: 0.9rem; font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--surface3);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .tab-badge {
      background: var(--accent3);
      color: #fff;
      font-size: 0.7rem; font-weight: 700;
      padding: 1px 7px;
      border-radius: 10px;
      min-width: 20px; text-align: center;
      display: none;
    }
    .tab-badge.visible { display: inline-block; }

    /* ── Tab Panels ─────────────────────────────────────────────────── */
    .tab-panel { display: none; padding-top: 24px; }
    .tab-panel.active { display: block; }

    /* ── Upload Zone ─────────────────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }
    .upload-zone::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(61,159,255,0.05), rgba(124,92,252,0.05));
      opacity: 0; transition: opacity 0.3s;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      box-shadow: var(--glow);
    }
    .upload-zone:hover::before, .upload-zone.drag-over::before { opacity: 1; }

    .upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .upload-zone h3 {
      font-family: "Syne", sans-serif;
      font-size: 1rem; font-weight: 700;
      margin-bottom: 6px;
    }
    .upload-zone p { font-size: 0.85rem; color: var(--text-2); }
    .upload-zone .types {
      margin-top: 12px;
      display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    }
    .type-tag {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 0.75rem; color: var(--text-2);
    }
    #file-input { display: none; }

    /* ── Upload Status ────────────────────────────────────────────────── */
    #upload-status {
      margin-top: 14px;
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      display: none;
      animation: slideDown 0.3s ease;
    }
    #upload-status.success {
      background: rgba(61,255,159,0.1);
      border: 1px solid rgba(61,255,159,0.3);
      color: var(--green);
    }
    #upload-status.error {
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.3);
      color: var(--accent3);
    }

    /* ── Chat container ──────────────────────────────────────────────── */
    #chat-wrap {
      margin-top: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    #chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      font-family: "Syne", sans-serif;
      font-size: 0.9rem; font-weight: 700;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #messages {
      height: 420px;
      overflow-y: auto;
      padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
      scrollbar-width: thin; scrollbar-color: var(--surface3) transparent;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

    /* ── Welcome state ────────────────────────────────────────────────── */
    .welcome-msg {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 12px;
      color: var(--text-3);
    }
    .welcome-msg .icon { font-size: 2.5rem; }
    .welcome-msg p { font-size: 0.9rem; text-align: center; max-width: 280px; line-height: 1.5; }

    /* ── Message bubbles ─────────────────────────────────────────────── */
    .message { display: flex; gap: 12px; animation: slideDown 0.3s ease; max-width: 85%; }
    .message.user  { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot   { align-self: flex-start; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 34px; height: 34px; flex-shrink: 0;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .message.user .msg-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }
    .message.bot .msg-avatar {
      background: var(--surface3);
      border: 1px solid var(--border);
    }

    .msg-content {}
    .msg-bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.9rem; line-height: 1.6;
      white-space: pre-wrap;
    }
    .message.user .msg-bubble {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border-top-right-radius: 4px;
    }
    .message.bot .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-top-left-radius: 4px;
    }
    .message.bot.out-of-scope .msg-bubble {
      border-color: rgba(255,179,71,0.3);
      background: rgba(255,179,71,0.07);
    }

    /* ── Audio player ─────────────────────────────────────────────────── */
    .msg-audio {
      margin-top: 8px;
      display: flex; align-items: center; gap: 10px;
    }
    .audio-btn {
      width: 32px; height: 32px;
      border-radius: 50%; border: none;
      background: var(--accent);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: all 0.2s;
      box-shadow: 0 2px 10px rgba(61,159,255,0.3);
      flex-shrink: 0;
    }
    .audio-btn:hover { transform: scale(1.1); background: var(--accent2); }
    .audio-btn.playing { background: var(--accent3); }

    .audio-progress-wrap {
      flex: 1; height: 4px; background: var(--surface3);
      border-radius: 2px; cursor: pointer; position: relative;
      overflow: hidden;
    }
    .audio-progress-bar {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 2px; transition: width 0.1s linear;
    }
    .audio-time { font-size: 0.72rem; color: var(--text-2); white-space: nowrap; }

    /* ── Chat input ──────────────────────────────────────────────────── */
    #chat-input-area {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
    }
    #question-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text);
      font-family: "DM Sans", sans-serif;
      font-size: 0.9rem;
      resize: none; min-height: 46px; max-height: 120px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.5;
    }
    #question-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61,159,255,0.12);
    }
    #question-input::placeholder { color: var(--text-3); }

    #ask-btn {
      width: 46px; height: 46px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: var(--radius-sm);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(61,159,255,0.3);
    }
    #ask-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(61,159,255,0.4); }
    #ask-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Typing indicator ─────────────────────────────────────────────── */
    .typing { display: flex; align-items: center; gap: 6px; padding: 10px 14px; }
    .typing span {
      width: 7px; height: 7px; background: var(--text-3); border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* ── Admin Panel ─────────────────────────────────────────────────── */
    #admin-panel {}

    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .admin-header h2 {
      font-family: "Syne", sans-serif;
      font-size: 1.2rem; font-weight: 800;
    }
    .admin-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.8rem; color: var(--text-2);
    }
    .admin-count strong { color: var(--accent); }

    #unanswered-list {
      display: flex; flex-direction: column; gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: slideDown 0.3s ease;
      transition: border-color 0.2s;
    }
    .question-card:hover { border-color: var(--border-glow); }

    .q-header {
      padding: 14px 18px;
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .q-meta { flex: 1; }
    .q-label {
      font-size: 0.72rem; font-weight: 600; color: var(--accent3);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .q-text {
      font-size: 0.9rem; font-weight: 500; line-height: 1.5;
    }
    .q-time { font-size: 0.75rem; color: var(--text-3); margin-top: 4px; }

    .q-body { padding: 16px 18px; }

    .hint-text {
      font-size: 0.78rem; color: var(--text-3); font-style: italic;
      margin-bottom: 10px;
    }

    .admin-answer-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      color: var(--text);
      font-family: "DM Sans", sans-serif;
      font-size: 0.875rem; line-height: 1.6;
      resize: vertical; min-height: 80px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .admin-answer-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61,159,255,0.1);
    }
    .admin-answer-input::placeholder { color: var(--text-3); }

    .q-actions {
      display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end;
    }

    .btn-save {
      padding: 8px 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: var(--radius-sm);
      color: #fff; font-family: "DM Sans", sans-serif;
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 2px 10px rgba(61,159,255,0.25);
      display: flex; align-items: center; gap: 6px;
    }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(61,159,255,0.35); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-remove {
      padding: 8px 14px;
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.2);
      border-radius: var(--radius-sm);
      color: var(--accent3);
      font-family: "DM Sans", sans-serif;
      font-size: 0.85rem; cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 5px;
    }
    .btn-remove:hover { background: rgba(255,107,107,0.2); }

    .empty-admin {
      text-align: center; padding: 60px 20px;
      color: var(--text-3);
    }
    .empty-admin .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-admin p { font-size: 0.9rem; }

    /* ── Toast notification ──────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 30px; right: 30px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 20px;
      font-size: 0.875rem;
      box-shadow: var(--shadow);
      display: none; z-index: 999;
      animation: slideUp 0.3s ease;
      max-width: 320px;
    }
    #toast.show { display: block; }
    #toast.success { border-color: rgba(61,255,159,0.3); color: var(--green); }
    #toast.error   { border-color: rgba(255,107,107,0.3); color: var(--accent3); }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Loading spinner ─────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Misc utilities ──────────────────────────────────────────────── */
    .hidden { display: none !important; }
    hr.divider {
      border: none; border-top: 1px solid var(--border); margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div id="app">
    <!-- ── Header ── -->
    <header>
      <div class="logo">
        <div class="logo-icon">🤖</div>
        <div>
          <h1>Smart Q&A System</h1>
          <p>AI-powered document intelligence</p>
        </div>
      </div>
      <div id="file-badge">
        <span>📄</span>
        <span id="badge-filename">No file</span>
      </div>
    </header>

    <!-- ── Tabs ── -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('chat')" id="tab-chat">
        💬 Chat
      </button>
      <button class="tab-btn" onclick="switchTab('admin')" id="tab-admin">
        🛠️ Admin Panel
        <span class="tab-badge" id="admin-badge">0</span>
      </button>
    </div>

    <!-- ══════════════════════════════════════════
         CHAT TAB
    ══════════════════════════════════════════ -->
    <div class="tab-panel active" id="panel-chat">

      <!-- Upload Zone -->
      <div class="upload-zone" id="upload-zone"
           ondragover="event.preventDefault(); this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="handleDrop(event)"
           onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">📁</div>
        <h3>Drop your file here or click to browse</h3>
        <p>Upload a document to start asking questions</p>
        <div class="types">
          <span class="type-tag">PDF</span>
          <span class="type-tag">DOCX</span>
          <span class="type-tag">TXT</span>
          <span class="type-tag">MD</span>
        </div>
        <input type="file" id="file-input" accept=".txt,.pdf,.docx,.md"
               onchange="handleFileSelect(event)" />
      </div>

      <div id="upload-status"></div>

      <!-- Chat Box -->
      <div id="chat-wrap">
        <div id="chat-header">
          <div class="dot"></div>
          <span>Document Assistant</span>
        </div>
        <div id="messages">
          <div class="welcome-msg" id="welcome-msg">
            <div class="icon">📂</div>
            <p>Upload a document above, then start asking questions about it.</p>
          </div>
        </div>
        <div id="chat-input-area">
          <textarea id="question-input"
                    placeholder="Ask a question about your document…"
                    rows="1"
                    onkeydown="handleKeydown(event)"
                    oninput="autoResize(this)"></textarea>
          <button id="ask-btn" onclick="askQuestion()" title="Send">
            ➤
          </button>
        </div>
      </div>
    </div><!-- /panel-chat -->

    <!-- ══════════════════════════════════════════
         ADMIN TAB
    ══════════════════════════════════════════ -->
    <div class="tab-panel" id="panel-admin">
      <div class="admin-header">
        <h2>🛠️ Unanswered Questions</h2>
        <div class="admin-count">
          <strong id="admin-total">0</strong> pending
        </div>
      </div>

      <div id="unanswered-list"></div>
    </div><!-- /panel-admin -->

  </div><!-- /#app -->

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    // ── State ────────────────────────────────────────────────────────
    let audioElements = {};

    // ── Init ─────────────────────────────────────────────────────────
    window.addEventListener("DOMContentLoaded", () => {
      loadSessionInfo();
      loadUnanswered();
    });

    async function loadSessionInfo() {
      try {
        const r = await fetch("/session-info");
        const d = await r.json();
        if (d.has_file) {
          setBadge(d.filename);
          hideWelcome();
        }
      } catch {}
    }

    // ── Tab switching ─────────────────────────────────────────────────
    function switchTab(name) {
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("panel-" + name).classList.add("active");
      document.getElementById("tab-"   + name).classList.add("active");
      if (name === "admin") loadUnanswered();
    }

    // ── File upload ────────────────────────────────────────────────────
    function handleDrop(event) {
      event.preventDefault();
      document.getElementById("upload-zone").classList.remove("drag-over");
      const file = event.dataTransfer.files[0];
      if (file) uploadFile(file);
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (file) uploadFile(file);
    }

    async function uploadFile(file) {
      const statusEl = document.getElementById("upload-status");
      statusEl.className = "";
      statusEl.style.display = "block";
      statusEl.textContent = "⏳ Uploading and extracting text…";

      const fd = new FormData();
      fd.append("file", file);

      try {
        const r = await fetch("/upload", { method: "POST", body: fd });
        const d = await r.json();

        if (!r.ok) {
          statusEl.className = "error";
          statusEl.textContent = "❌ " + (d.detail || "Upload failed");
          return;
        }

        statusEl.className = "success";
        statusEl.textContent =
          `✅ ${d.filename}  •  ${d.word_count.toLocaleString()} words extracted`;

        setBadge(d.filename);
        hideWelcome();
        showToast("File uploaded successfully!", "success");
      } catch (err) {
        statusEl.className = "error";
        statusEl.textContent = "❌ Network error. Is the server running?";
      }
    }

    function setBadge(name) {
      const badge = document.getElementById("file-badge");
      document.getElementById("badge-filename").textContent = name;
      badge.classList.add("active");
    }

    function hideWelcome() {
      const w = document.getElementById("welcome-msg");
      if (w) w.remove();
    }

    // ── Ask question ──────────────────────────────────────────────────
    async function askQuestion() {
      const input = document.getElementById("question-input");
      const question = input.value.trim();
      if (!question) return;

      appendMessage("user", question);
      input.value = "";
      input.style.height = "46px";

      const btn = document.getElementById("ask-btn");
      btn.disabled = true;

      // Show typing indicator
      const typingId = "typing-" + Date.now();
      appendTyping(typingId);

      try {
        const r = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const d = await r.json();

        removeTyping(typingId);

        if (!r.ok) {
          appendMessage("bot", "⚠️ " + (d.detail || "Error getting response"), false, null, false);
        } else {
          appendMessage(
            "bot",
            d.answer,
            d.is_out_of_scope,
            d.audio_url,
            true
          );
          if (d.is_out_of_scope) {
            setTimeout(() => { loadUnanswered(); updateAdminBadge(); }, 500);
          }
        }
      } catch (err) {
        removeTyping(typingId);
        appendMessage("bot", "❌ Connection error. Is the server running?");
      }

      btn.disabled = false;
    }

    function handleKeydown(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        askQuestion();
      }
    }

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    // ── Chat rendering ────────────────────────────────────────────────
    function appendMessage(role, text, isOutOfScope = false, audioUrl = null, hasAudio = false) {
      const msgs = document.getElementById("messages");
      const id   = "msg-" + Date.now();

      const div = document.createElement("div");
      div.className = `message ${role}${isOutOfScope ? " out-of-scope" : ""}`;

      const avatar = role === "user" ? "👤" : (isOutOfScope ? "⚠️" : "🤖");

      let audioHTML = "";
      if (hasAudio && audioUrl) {
        const audioId = "audio-" + Date.now();
        audioHTML = `
          <div class="msg-audio">
            <button class="audio-btn" id="btn-${audioId}" onclick="toggleAudio('${audioId}', '${audioUrl}')">▶</button>
            <div class="audio-progress-wrap" onclick="seekAudio(event, '${audioId}')">
              <div class="audio-progress-bar" id="prog-${audioId}"></div>
            </div>
            <span class="audio-time" id="time-${audioId}">0:00</span>
          </div>`;
      }

      div.innerHTML = `
        <div class="msg-avatar">${avatar}</div>
        <div class="msg-content">
          <div class="msg-bubble">${escHtml(text)}</div>
          ${audioHTML}
        </div>`;

      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function appendTyping(id) {
      const msgs = document.getElementById("messages");
      const div  = document.createElement("div");
      div.id = id;
      div.className = "message bot";
      div.innerHTML = `
        <div class="msg-avatar">🤖</div>
        <div class="msg-content">
          <div class="msg-bubble" style="padding:6px 14px;">
            <div class="typing"><span></span><span></span><span></span></div>
          </div>
        </div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    // ── Audio player ──────────────────────────────────────────────────
    function toggleAudio(audioId, url) {
      const btn  = document.getElementById("btn-" + audioId);
      const prog = document.getElementById("prog-" + audioId);
      const time = document.getElementById("time-" + audioId);

      // Stop any other playing audio
      Object.keys(audioElements).forEach(k => {
        if (k !== audioId && audioElements[k]) {
          audioElements[k].pause();
          const ob = document.getElementById("btn-" + k);
          if (ob) { ob.textContent = "▶"; ob.classList.remove("playing"); }
        }
      });

      if (!audioElements[audioId]) {
        const audio = new Audio(url);
        audioElements[audioId] = audio;

        audio.addEventListener("timeupdate", () => {
          if (audio.duration) {
            const pct = (audio.currentTime / audio.duration) * 100;
            if (prog) prog.style.width = pct + "%";
            if (time) time.textContent = formatTime(audio.currentTime);
          }
        });
        audio.addEventListener("ended", () => {
          btn.textContent = "▶"; btn.classList.remove("playing");
          if (prog) prog.style.width = "0%";
          if (time) time.textContent = "0:00";
        });
      }

      const audio = audioElements[audioId];
      if (audio.paused) {
        audio.play();
        btn.textContent = "⏸"; btn.classList.add("playing");
      } else {
        audio.pause();
        btn.textContent = "▶"; btn.classList.remove("playing");
      }
    }

    function seekAudio(event, audioId) {
      const audio = audioElements[audioId];
      if (!audio || !audio.duration) return;
      const wrap  = event.currentTarget;
      const pct   = event.offsetX / wrap.offsetWidth;
      audio.currentTime = pct * audio.duration;
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, "0")}`;
    }

    // ── Admin Panel ────────────────────────────────────────────────────
    async function loadUnanswered() {
      try {
        const r = await fetch("/unanswered");
        const d = await r.json();
        renderUnanswered(d.questions);
        updateAdminBadge(d.count);
      } catch {}
    }

    function updateAdminBadge(count) {
      const badge = document.getElementById("admin-badge");
      const total = document.getElementById("admin-total");
      const n = count !== undefined ? count : (parseInt(badge.textContent) || 0);
      badge.textContent = n;
      badge.classList.toggle("visible", n > 0);
      if (total) total.textContent = n;
    }

    function renderUnanswered(questions) {
      const list = document.getElementById("unanswered-list");
      const total = document.getElementById("admin-total");
      if (total) total.textContent = questions.length;

      if (questions.length === 0) {
        list.innerHTML = `
          <div class="empty-admin">
            <div class="icon">✅</div>
            <p>No unanswered questions right now.<br>Great work!</p>
          </div>`;
        return;
      }

      list.innerHTML = questions.map(q => `
        <div class="question-card" id="card-${q.id}">
          <div class="q-header">
            <div class="q-meta">
              <div class="q-label">Unanswered Question</div>
              <div class="q-text">${escHtml(q.question)}</div>
              <div class="q-time">🕒 ${q.timestamp}</div>
            </div>
          </div>
          <div class="q-body">
            ${q.hallucinated_answer ? `<div class="hint-text">💭 AI preliminary thought: ${escHtml(q.hallucinated_answer)}</div>` : ""}
            <textarea class="admin-answer-input"
                      id="ans-${q.id}"
                      placeholder="Type the correct answer here…"></textarea>
            <div class="q-actions">
              <button class="btn-remove" onclick="removeQuestion('${q.id}')">
                🗑️ Remove
              </button>
              <button class="btn-save" onclick="saveAnswer('${q.id}')">
                💾 Save Answer
              </button>
            </div>
          </div>
        </div>`
      ).join("");
    }

    async function saveAnswer(qId) {
      const answerEl = document.getElementById("ans-" + qId);
      const answer   = answerEl.value.trim();

      if (!answer) {
        showToast("Please type an answer before saving.", "error");
        return;
      }

      const btn = answerEl.closest(".q-body").querySelector(".btn-save");
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> Saving…`;

      try {
        const r = await fetch("/admin/answer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question_id: qId, answer }),
        });
        const d = await r.json();

        if (!r.ok) {
          showToast(d.detail || "Error saving answer", "error");
          btn.disabled = false; btn.innerHTML = "💾 Save Answer";
          return;
        }

        // Animate removal
        const card = document.getElementById("card-" + qId);
        card.style.opacity = "0";
        card.style.transform = "translateX(40px)";
        card.style.transition = "all 0.3s ease";
        setTimeout(() => { card.remove(); loadUnanswered(); }, 320);

        showToast("Answer saved! Future questions will use this answer.", "success");
      } catch {
        showToast("Network error. Please try again.", "error");
        btn.disabled = false; btn.innerHTML = "💾 Save Answer";
      }
    }

    async function removeQuestion(qId) {
      if (!confirm("Remove this question from the unanswered list?")) return;

      try {
        const r = await fetch(`/admin/remove/${qId}`, { method: "DELETE" });
        if (!r.ok) { showToast("Error removing question", "error"); return; }

        const card = document.getElementById("card-" + qId);
        card.style.opacity = "0";
        card.style.transition = "opacity 0.3s";
        setTimeout(() => { card.remove(); loadUnanswered(); }, 300);
        showToast("Question removed.", "success");
      } catch {
        showToast("Network error.", "error");
      }
    }

    // ── Toast ─────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = "success") {
      const t = document.getElementById("toast");
      t.textContent = (type === "success" ? "✅ " : "❌ ") + msg;
      t.className = "show " + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = ""; }, 3500);
    }

    // ── Helpers ───────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
